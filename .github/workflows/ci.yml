name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.9'

jobs:
  quality:
    name: Typecheck, unit tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test

      - name: Build production bundle
        run: pnpm run build

      - name: Record build metadata
        shell: bash
        run: |
          {
            echo '## Build metadata'
            echo ''
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Node: \`$(node --version)\`"
            echo "- pnpm: \`$(pnpm --version)\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Bundle size: \`$(du -sh dist | cut -f1)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: football-2027-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  browser-smoke:
    name: Chromium smoke tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: pnpm exec playwright test --reporter=line,html

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
