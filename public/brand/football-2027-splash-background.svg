<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Football 2027 splash background</title>
  <desc id="desc">Night navy football pitch geometry with cyan and green progression light.</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="25%" cy="35%" r="65%">
      <stop offset="0" stop-color="#14D1E6" stop-opacity=".2"/>
      <stop offset="1" stop-color="#14D1E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="85%" cy="75%" r="55%">
      <stop offset="0" stop-color="#33D677" stop-opacity=".16"/>
      <stop offset="1" stop-color="#33D677" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101C" stop-opacity=".08"/>
      <stop offset="1" stop-color="#02070D" stop-opacity=".72"/>
    </linearGradient>
    <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="12" r="1" fill="#F2F7FF" opacity=".025"/>
      <circle cx="42" cy="34" r="1" fill="#F2F7FF" opacity=".018"/>
      <circle cx="58" cy="8" r="1" fill="#14D1E6" opacity=".02"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#07101C"/>
  <rect width="1920" height="1080" fill="url(#cyanGlow)"/>
  <rect width="1920" height="1080" fill="url(#greenGlow)"/>
  <g fill="none" stroke="#95A4B8" stroke-width="3" opacity=".13" transform="translate(770 92) rotate(-7 520 450)">
    <rect x="0" y="0" width="1040" height="720" rx="16"/>
    <line x1="520" y1="0" x2="520" y2="720"/>
    <circle cx="520" cy="360" r="104"/>
    <circle cx="520" cy="360" r="7" fill="#95A4B8" stroke="none"/>
    <rect x="0" y="190" width="170" height="340"/>
    <rect x="870" y="190" width="170" height="340"/>
    <rect x="0" y="270" width="66" height="180"/>
    <rect x="974" y="270" width="66" height="180"/>
  </g>
  <path d="M1080 1080 1588 0h166l-508 1080z" fill="#14D1E6" opacity=".035"/>
  <path d="M1320 1080 1828 0h92v172l-427 908z" fill="#33D677" opacity=".03"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
