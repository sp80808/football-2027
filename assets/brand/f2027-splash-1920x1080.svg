<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
<title id="title">Football 2027 splash screen concept</title><desc id="desc">Dark stadium tunnel splash with F27 logo, pitch glow and loading indicator.</desc>
